<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a7bd5"/>
      <stop offset="100%" style="stop-color:#2b5ea7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f4f8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="530" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="260" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Card 1 - image placeholder -->
  <g transform="translate(80, 180)">
    <rect width="180" height="240" rx="12" fill="url(#card)" opacity="0.95"/>
    <rect x="15" y="15" width="150" height="120" rx="8" fill="#e8eef5"/>
    <!-- Camera icon -->
    <rect x="55" y="50" width="70" height="50" rx="8" fill="#c5d3e3"/>
    <circle cx="90" cy="72" r="14" fill="#a8bdd4"/>
    <circle cx="90" cy="72" r="8" fill="#e8eef5"/>
    <rect x="72" y="48" width="20" height="8" rx="3" fill="#a8bdd4"/>
    <!-- Text lines -->
    <rect x="15" y="150" width="120" height="10" rx="3" fill="#c5d3e3"/>
    <rect x="15" y="168" width="90" height="8" rx="3" fill="#dde4ed"/>
    <rect x="15" y="184" width="60" height="8" rx="3" fill="#dde4ed"/>
    <!-- Green dot -->
    <circle cx="155" cy="155" r="8" fill="#27ae60"/>
  </g>

  <!-- Card 2 -->
  <g transform="translate(290, 160)">
    <rect width="180" height="240" rx="12" fill="url(#card)" opacity="0.95"/>
    <rect x="15" y="15" width="150" height="120" rx="8" fill="#e8eef5"/>
    <!-- Dice icon -->
    <rect x="50" y="40" width="80" height="80" rx="12" fill="#c5d3e3"/>
    <circle cx="72" cy="62" r="6" fill="#fff"/>
    <circle cx="108" cy="62" r="6" fill="#fff"/>
    <circle cx="90" cy="80" r="6" fill="#fff"/>
    <circle cx="72" cy="98" r="6" fill="#fff"/>
    <circle cx="108" cy="98" r="6" fill="#fff"/>
    <rect x="15" y="150" width="130" height="10" rx="3" fill="#c5d3e3"/>
    <rect x="15" y="168" width="100" height="8" rx="3" fill="#dde4ed"/>
    <rect x="15" y="184" width="70" height="8" rx="3" fill="#dde4ed"/>
    <circle cx="155" cy="155" r="8" fill="#27ae60"/>
  </g>

  <!-- Card 3 -->
  <g transform="translate(500, 180)">
    <rect width="180" height="240" rx="12" fill="url(#card)" opacity="0.95"/>
    <rect x="15" y="15" width="150" height="120" rx="8" fill="#e8eef5"/>
    <!-- Meeple icon -->
    <path d="M90,50 C90,50 75,55 75,70 C75,80 80,85 80,90 L65,110 L115,110 L100,90 C100,85 105,80 105,70 C105,55 90,50 90,50 Z" fill="#c5d3e3"/>
    <circle cx="90" cy="45" r="10" fill="#c5d3e3"/>
    <rect x="15" y="150" width="110" height="10" rx="3" fill="#c5d3e3"/>
    <rect x="15" y="168" width="80" height="8" rx="3" fill="#dde4ed"/>
    <rect x="15" y="184" width="95" height="8" rx="3" fill="#dde4ed"/>
    <circle cx="155" cy="155" r="8" fill="#f39c12"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(710, 280)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <polyline points="48,-12 62,0 48,12" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- CSV result -->
  <g transform="translate(800, 160)">
    <rect width="320" height="280" rx="12" fill="#fff" opacity="0.95"/>
    <!-- Header -->
    <rect x="0" y="0" width="320" height="40" rx="12" fill="#4a90d9"/>
    <rect x="0" y="20" width="320" height="20" fill="#4a90d9"/>
    <text x="20" y="27" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">Game</text>
    <text x="120" y="27" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">Year</text>
    <text x="170" y="27" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">Price</text>
    <text x="240" y="27" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">BGG</text>
    <!-- Row 1 -->
    <rect x="12" y="52" width="80" height="8" rx="2" fill="#c5d3e3"/>
    <rect x="120" y="52" width="30" height="8" rx="2" fill="#dde4ed"/>
    <rect x="170" y="52" width="50" height="8" rx="2" fill="#dde4ed"/>
    <rect x="240" y="52" width="40" height="8" rx="2" fill="#4a90d9" opacity="0.5"/>
    <circle cx="298" cy="56" r="6" fill="#27ae60"/>
    <!-- Row 2 -->
    <rect x="12" y="76" width="90" height="8" rx="2" fill="#c5d3e3"/>
    <rect x="120" y="76" width="30" height="8" rx="2" fill="#dde4ed"/>
    <rect x="170" y="76" width="45" height="8" rx="2" fill="#dde4ed"/>
    <rect x="240" y="76" width="40" height="8" rx="2" fill="#4a90d9" opacity="0.5"/>
    <circle cx="298" cy="80" r="6" fill="#27ae60"/>
    <!-- Row 3 -->
    <rect x="12" y="100" width="70" height="8" rx="2" fill="#c5d3e3"/>
    <rect x="120" y="100" width="30" height="8" rx="2" fill="#dde4ed"/>
    <rect x="170" y="100" width="55" height="8" rx="2" fill="#dde4ed"/>
    <rect x="240" y="100" width="40" height="8" rx="2" fill="#4a90d9" opacity="0.5"/>
    <circle cx="298" cy="104" r="6" fill="#f39c12"/>
    <!-- More rows faded -->
    <rect x="12" y="124" width="85" height="8" rx="2" fill="#e8eef5"/>
    <rect x="120" y="124" width="30" height="8" rx="2" fill="#eef2f7"/>
    <rect x="170" y="124" width="48" height="8" rx="2" fill="#eef2f7"/>
    <!-- Export button -->
    <rect x="90" y="230" width="140" height="36" rx="8" fill="#27ae60"/>
    <text x="115" y="253" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#fff">Export CSV</text>
  </g>

  <!-- Title -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="700" fill="#fff">Board Game Image to Listing</text>
  <text x="600" y="580" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,0.75)">Upload photos of board games — get a CSV with prices, links, and descriptions</text>
</svg>
